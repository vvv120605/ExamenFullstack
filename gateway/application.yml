server:
  port: 9999

spring:
  application:
    name: gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true   # 🔑 fuerza coincidencia con nombres en minúscula
      routes:
        # API Routes
        - id: login-service
          uri: lb://login
          predicates:
            - Path=/api/v1/users/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/v1/${segment}
        - id: destination-service
          uri: lb://destination
          predicates:
            - Path=/api/v1/destination/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/v1/${segment}
        - id: traveler-service
          uri: lb://traveler
          predicates:
            - Path=/api/v1/traveler/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /api/v1/${segment}
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty.http.client: DEBUG
    org.springframework.cloud.netflix.eureka: DEBUG
  file:
    name: logs/gateway.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
