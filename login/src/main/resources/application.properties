spring.application.name=login

server.port=9000

# Configuración de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3310/login
spring.datasource.username=vcofre
spring.datasource.password=vcofre123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA: desactivar creación automática de tablas
spring.jpa.hibernate.ddl-auto=none

# Dialecto recomendado para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway: habilitar migraciones
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Configuración de Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90
